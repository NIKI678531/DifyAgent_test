version: '3.8'

services:
  # 主 Dify Agent 服务
  dify-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dify-agent-api
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - AKSHARE_TIMEOUT=30
      - LOG_LEVEL=INFO
    volumes:
      - ./DifyAgent:/app/DifyAgent:ro
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - dify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis
    labels:
      - "com.example.description=Dify Stock Analysis API"
      - "version=2.0.0"

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: dify-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass difyagent123
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - dify-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - TZ=Asia/Shanghai

  # PostgreSQL 数据库（可选）
  postgres:
    image: postgres:15-alpine
    container_name: dify-postgres
    environment:
      - POSTGRES_USER=dify
      - POSTGRES_PASSWORD=difyagent123
      - POSTGRES_DB=difyagent
      - TZ=Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - dify-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - full

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: dify-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - dify-network
    depends_on:
      - dify-agent
    profiles:
      - full

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  dify-network:
    driver: bridge

# 使用说明：
# 
# 启动基础服务（仅 API + Redis）：
#   docker-compose up -d
#
# 启动完整服务（包括 PostgreSQL 和 Nginx）：
#   docker-compose --profile full up -d
#
# 查看日志：
#   docker-compose logs -f dify-agent
#
# 停止服务：
#   docker-compose down
#
# 清理所有数据（包括卷）：
#   docker-compose down -v
#
# 重建镜像：
#   docker-compose build --no-cache
#
# 更新服务：
#   docker-compose up -d --build dify-agent
